<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Zombie Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 24px;
        pointer-events: none;
        user-select: none;
      }
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        cursor: pointer;
      }
      #overlay h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      #overlay p {
        font-size: 1.2rem;
        opacity: 0.7;
      }

      #hud {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 300px;
        z-index: 10;
      }
      #health-container {
        width: 100%;
        height: 20px;
        background: rgba(0, 0, 0, 0.5);
        border: 2px solid #fff;
      }
      #health-bar {
        width: 100%;
        height: 100%;
        background: #ff0000;
        transition: width 0.3s;
      }
      #ammo-display {
        color: white;
        font-family: sans-serif;
        margin-top: 5px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <p>Clique pour jouer</p>
    </div>
    <div id="crosshair">+</div>
    <div id="hud">
      <div id="health-container">
        <div id="health-bar"></div>
      </div>
      <div id="ammo-display">READY</div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
